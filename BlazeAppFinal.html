<script type="text/babel">
const { useState, useMemo, useEffect } = React;

const PRIORITY_POINTS = { low: 5, medium: 10, high: 20 };
const PRIORITY_LABEL = { low: "Low", medium: "Medium", high: "High" };
const PRIORITY_COLOR = { low: "#3ecf8e", medium: "#ffc94d", high: "#ef4444" };
const WEEKDAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const WEEKDAYS_FULL = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const SPARK_COLORS = ["#ff7a1a","#ffc94d","#ef4444","#ff5722","#fff176"];
const CELEBRATIONS = ["Lit!", "On fire!", "Streak's alive!", "Blazing!", "Heat rising!", "Nice burn!"];

const DEFAULT_CATEGORIES = [
  { id: "work", name: "Work", color: "#4da6ff" },
  { id: "personal", name: "Personal", color: "#ff5fa8" },
  { id: "fitness", name: "Fitness", color: "#3ecf8e" },

// order used for both the bottom nav and swipe-between-tabs (the "add" sheet and settings — reached via the gear icon — are excluded from the swipe cycle)
const NAV_ORDER = ["home", "calendar", "timer", "stats"];

function fmtDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}
function todayStr() { return fmtDate(new Date()); }
function addDays(dateStr, n) {
  const d = new Date(dateStr + "T00:00:00");
  d.setDate(d.getDate() + n);
  return fmtDate(d);
}

function streakTier(streak) {
  if (streak >= 30) return { name: "Legendary", className: "legendary", glow: "#ff5fa899", color: "#ff5fa8" };
  if (streak >= 14) return { name: "Purple blaze", className: "tier-purple", glow: "#9d6bff99", color: "#9d6bff" };
  if (streak >= 7) return { name: "Blue flame", className: "tier-blue", glow: "#4da6ff99", color: "#4da6ff" };
  if (streak >= 3) return { name: "On fire", className: "tier-red", glow: "#ef444499", color: "#ef4444" };
  if (streak >= 1) return { name: "Warming up", className: "tier-orange", glow: "#ff7a1a99", color: "#ff7a1a" };
  return { name: "No streak yet", className: "tier-gray", glow: "#6b728055", color: "#6b7280" };
}

function flameFilter(streak) {
  if (streak >= 30) return {};
  if (streak >= 14) return { filter: "hue-rotate(220deg) saturate(1.6)" };
  if (streak >= 7) return { filter: "hue-rotate(150deg) saturate(1.5)" };
  if (streak >= 3) return { filter: "hue-rotate(-18deg) saturate(1.5)" };
  if (streak >= 1) return {};
  return { filter: "grayscale(0.85) brightness(0.8)" };
}

function useSparks() {
  const [bursts, setBursts] = useState([]);
  const fire = (x, y) => {
    const id = Date.now() + Math.random();
    const bits = Array.from({ length: 12 }, (_, i) => ({
      id: id + "_" + i,
      dx: (Math.random() - 0.5) * 70,
      delay: Math.random() * 0.12,
      color: SPARK_COLORS[i % SPARK_COLORS.length],
    }));
    setBursts(prev => [...prev, { id, x, y, bits }]);
    setTimeout(() => setBursts(prev => prev.filter(b => b.id !== id)), 950);
  };
  const layer = (
    <div className="bz-spark-layer">
      {bursts.map(b => b.bits.map(bit => (
        <div key={bit.id} className="bz-spark-bit" style={{ left: b.x + bit.dx, top: b.y, background: bit.color, animationDelay: bit.delay + "s" }} />
      )))}
    </div>
  );
  return { fire, layer };
}

function useToast() {
  const [toast, setToast] = useState(null);
  const timerRef = React.useRef(null);

  const show = (msg, undoFn) => {
    if (timerRef.current) clearTimeout(timerRef.current);
    setToast({ msg, undoFn });
    timerRef.current = setTimeout(() => setToast(null), undoFn ? 3500 : 1500);
  };

  const dismiss = () => {
    if (timerRef.current) clearTimeout(timerRef.current);
    setToast(null);
  };

  const node = toast ? (
    <div className="bz-toast" style={{ display: "flex", alignItems: "center", gap: 10 }}>
      <span style={{ flex: 1 }}>{toast.msg}</span>
      {toast.undoFn && (
        <button
          onClick={() => { toast.undoFn(); dismiss(); }}
          style={{ background: "rgba(255,255,255,0.25)", border: "none", borderRadius: 8, color: "#1a0d00", fontWeight: 800, fontSize: 12, padding: "4px 10px", cursor: "pointer" }}
        >
          Undo
        </button>
      )}
    </div>
  ) : null;

  return { show, node };
}

function useFireWave() {
  const [waveKey, setWaveKey] = useState(null);
  const lastTopRef = React.useRef(0);

  const onScroll = (e) => {
    const top = e.target.scrollTop;
    const wasAway = lastTopRef.current > 24;
    if (top <= 0 && wasAway) {
      setWaveKey(Date.now());
    }
    lastTopRef.current = top;
  };

  const node = waveKey ? (
    <div className="bz-firewave-overlay" key={waveKey}>🔥🔥🔥</div>
  ) : null;

  return { onScroll, node };
}

const STORAGE_KEY = "blaze_app_state_v1";

function loadSavedState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) {
    console.error("Failed to load saved state", e);
    return null;
  }
}

const MILESTONES = [3, 7, 14, 30, 50, 100, 200, 365];
const MILESTONE_MESSAGES = {
  3: "🔥 3 days! Off to a real start.",
  7: "🔥 1 week strong!",
  14: "🔥 2 weeks. Blue flame status.",
  30: "🔥 30 days. Purple blaze unlocked.",
  50: "🔥 50 days. That's serious.",
  100: "🔥 100 DAYS. Legendary.",
  200: "🔥 200 days?! Absurd.",
  365: "🔥 A FULL YEAR. Unreal.",
};

function playChime(highPitch) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "sine";
    osc.frequency.value = highPitch ? 880 : 660;
    gain.gain.setValueAtTime(0.16, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.28);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.28);
  } catch (e) {}
}

function playMilestoneChime() {
  playChime(false);
  setTimeout(() => playChime(true), 130);
}

function doVibrate(pattern) {
  try { if (navigator.vibrate) navigator.vibrate(pattern); } catch (e) {}
}

const FLAME_PATH = "M12 23c-4.418 0-8-3.134-8-7 0-2.373 1.316-4.42 2.865-6.196C8.365 7.99 10 5.5 10 3c0 0 5 2 5 7 0 1-.5 2-.5 2s2.5-1 3.5-4c1 2 2 4 2 8 0 3.866-3.582 7-8 7z";

// a real animated flame built from 3 independently-flickering layers instead of a static emoji —
// bigger streaks get more (and more frequent) rising embers, chess.com-streak style.
function FlameIcon({ streak, size = 46 }) {
  const tone = flameFilter(streak);
  const emberCount = streak >= 30 ? 6 : streak >= 14 ? 5 : streak >= 7 ? 4 : streak >= 3 ? 3 : streak >= 1 ? 2 : 0;
  const embers = useMemo(() => Array.from({ length: emberCount }, (_, i) => ({
    left: 26 + Math.random() * 46,
    delay: (i * 0.3) + Math.random() * 0.4,
    dot: 3 + Math.random() * 3,
  })), [emberCount]);

  return (
    <div className="bz-flame-wrap" style={{ width: size, height: size, ...tone }}>
      {embers.map((e, i) => (
        <div key={i} className="bz-ember" style={{ left: `${e.left}%`, bottom: "42%", width: e.dot, height: e.dot, background: i % 2 ? "var(--gold)" : "var(--orange-deep)", animationDelay: `${e.delay}s` }} />
      ))}
      <svg className="bz-flame-layer-outer" style={{ position: "absolute", left: 0, top: 0 }} width={size} height={size} viewBox="0 0 24 24">
        <path d={FLAME_PATH} fill="var(--orange-deep)" />
      </svg>
      <svg className="bz-flame-layer-mid" style={{ position: "absolute", left: size * 0.15, top: size * 0.13 }} width={size * 0.68} height={size * 0.68} viewBox="0 0 24 24">
        <path d={FLAME_PATH} fill="var(--gold)" />
      </svg>
      <svg className="bz-flame-layer-core" style={{ position: "absolute", left: size * 0.32, top: size * 0.32 }} width={size * 0.36} height={size * 0.36} viewBox="0 0 24 24">
        <path d={FLAME_PATH} fill="#fff4c2" />
      </svg>
    </div>
  );
}

function App() {
  const saved = loadSavedState();
  const [view, setView] = useState("home");
  const [slideDir, setSlideDir] = useState("right");
  const changeView = (nextView) => {
    const curIdx = NAV_ORDER.indexOf(view);
    const nextIdx = NAV_ORDER.indexOf(nextView);
    if (curIdx !== -1 && nextIdx !== -1 && nextIdx !== curIdx) {
      setSlideDir(nextIdx > curIdx ? "right" : "left");
    }
    setView(nextView);
  };
  const swipeRef = React.useRef({ x: 0, y: 0, active: false, fromTask: false });
  const onContentTouchStart = (e) => {
    const t = e.touches[0];
    swipeRef.current = { x: t.clientX, y: t.clientY, active: true, fromTask: !!(e.target.closest && e.target.closest(".bz-task-item")) };
  };
  const onContentTouchEnd = (e) => {
    const s = swipeRef.current;
    swipeRef.current = { ...s, active: false };
    if (!s.active || s.fromTask) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - s.x;
    const dy = t.clientY - s.y;
    if (Math.abs(dx) < 60 || Math.abs(dx) < Math.abs(dy) * 1.3) return;
    const curIdx = NAV_ORDER.indexOf(view);
    if (curIdx === -1) return;
    if (dx < 0 && curIdx < NAV_ORDER.length - 1) changeView(NAV_ORDER[curIdx + 1]);
    else if (dx > 0 && curIdx > 0) changeView(NAV_ORDER[curIdx - 1]);
  };
  const [categories, setCategories] = useState(saved?.categories || DEFAULT_CATEGORIES);
  const [tasks, setTasks] = useState(saved?.tasks || []);
  const [points, setPoints] = useState(saved?.points || 0);
  const [soundEnabled, setSoundEnabled] = useState(saved?.soundEnabled !== false);
  const [selectedDate, setSelectedDate] = useState(todayStr());
  const [calMonth, setCalMonth] = useState(new Date());
  const { fire, layer } = useSparks();
  const { onScroll: onWaveScroll, node: waveNode } = useFireWave();
  const { show, node: toastNode } = useToast();
  const prevStreakRef = React.useRef(0);

  const addTask = (text, categoryId, priority, date, repeat, weekdays, minutes) => {
    const templateId = "tpl_" + Date.now();
    const instances = [];
    if (repeat === "daily") {
      for (let i = 0; i < 30; i++) instances.push(addDays(date, i));
    } else if (repeat === "weekly") {
      (weekdays && weekdays.length ? weekdays : [new Date(date + "T00:00:00").getDay()]).forEach(wd => {
        let d = new Date(date + "T00:00:00");
        while (d.getDay() !== wd) d.setDate(d.getDate() + 1);
        for (let i = 0; i < 8; i++) { instances.push(fmtDate(d)); d.setDate(d.getDate() + 7); }
      });
    } else {
      instances.push(date);
    }
    const newTasks = instances.map((d, i) => ({
      id: Date.now() + i + Math.random(),
      templateId: repeat === "none" ? null : templateId,
      repeat, text, categoryId, priority, date: d,
      done: false, minutes: minutes,
    }));
    setTasks(prev => [...prev, ...newTasks]);
  };

  const toggleDone = (id, evt) => {
    setTasks(prev => prev.map(t => {
      if (t.id !== id) return t;
      const nowDone = !t.done;
      setPoints(p => p + (nowDone ? PRIORITY_POINTS[t.priority] : -PRIORITY_POINTS[t.priority]));
      if (nowDone) {
        show(CELEBRATIONS[Math.floor(Math.random() * CELEBRATIONS.length)]);
        if (evt) fire(evt.clientX, evt.clientY);
        if (soundEnabled) { playChime(false); doVibrate(35); }
      }
      return { ...t, done: nowDone };
    }));
  };

  const removeTask = (id) => {
    const task = tasks.find(t => t.id === id);
    if (!task) return;

    let removed;
    let remaining;

    if (task.templateId) {
      // recurring: delete this instance + all future instances of same series
      const today = todayStr();
      removed = tasks.filter(t => t.templateId === task.templateId && t.date >= today);
      remaining = tasks.filter(t => !(t.templateId === task.templateId && t.date >= today));
    } else {
      removed = [task];
      remaining = tasks.filter(t => t.id !== id);
    }

    setTasks(remaining);

    const label = task.templateId
      ? `Removed ${removed.length} instance${removed.length > 1 ? "s" : ""} of "${task.text}"`
      : `Removed "${task.text}"`;

    show(label, () => setTasks(prev => {
      // re-insert removed tasks sorted by date
      const merged = [...prev, ...removed];
      merged.sort((a, b) => a.date < b.date ? -1 : 1);
      return merged;
    }));
  };
  const addCategory = (name, color) => setCategories(prev => [...prev, { id: "cat-" + Date.now(), name, color }]);

  const totalCompleted = tasks.filter(t => t.done).length;
  const [bestStreak, setBestStreak] = useState(saved?.bestStreak || 0);
  const [frozenDates, setFrozenDates] = useState(saved?.frozenDates || []);

  // a day "counts" toward the streak only if every task scheduled that day is done.
  // days with nothing scheduled are skipped (they don't break the streak, but don't add to it either).
  // today is only counted once everything on it is done; an unfinished today does not break the streak yet.
  const isDayComplete = (ds) => {
    const dayTasks = tasks.filter(t => t.date === ds);
    if (dayTasks.length === 0) return null;
    return dayTasks.every(t => t.done);
  };

  // freezes are earned at streak milestones: every 7-day mark (7, 14, 21, 28...) plus a bonus at the
  // bigger milestones (30, 50, 100, 200, 365). Based on your best-ever streak so already-earned freezes
  // don't vanish just because a later streak breaks.
  const freezesEarned = useMemo(() => {
    let count = Math.floor(bestStreak / 7);
    [30, 50, 100, 200, 365].forEach(milestone => { if (bestStreak >= milestone) count++; });
    return count;
  }, [bestStreak]);
  const freezesAvailable = Math.max(0, freezesEarned - frozenDates.length);

  const { streak, newlyFrozen } = useMemo(() => {
    let s = 0;
    let usedThisPass = [];
    let availableNow = freezesEarned - frozenDates.length;
    let d = new Date();
    const todayStatus = isDayComplete(fmtDate(d));
    if (todayStatus === true) { s++; }
    d.setDate(d.getDate() - 1);
    let safety = 0;
    while (safety < 365) {
      const ds = fmtDate(d);
      const status = isDayComplete(ds);
      if (status === true) { s++; d.setDate(d.getDate() - 1); }
      else if (status === null) { d.setDate(d.getDate() - 1); }
      else if (status === false && (frozenDates.includes(ds) || availableNow > 0)) {
        if (!frozenDates.includes(ds)) { usedThisPass.push(ds); availableNow--; }
        s++; d.setDate(d.getDate() - 1);
      } else break;
      safety++;
    }
    return { streak: s, newlyFrozen: usedThisPass };
  }, [tasks, frozenDates, freezesEarned]);

  // true from the moment a freeze auto-covers a missed day until you finish today's tasks —
  // i.e. "you're currently coasting on a freeze, get back on track"
  const livingOnFreeze = useMemo(() => {
    const today = todayStr();
    if (isDayComplete(today) === true) return false;
    const yesterday = addDays(today, -1);
    return isDayComplete(yesterday) === false && frozenDates.includes(yesterday);
  }, [tasks, frozenDates]);

  useEffect(() => {
    if (newlyFrozen.length > 0) {
      setFrozenDates(prev => [...new Set([...prev, ...newlyFrozen])]);
    }
  }, [newlyFrozen]);

  useEffect(() => {
    if (streak > bestStreak) setBestStreak(streak);
  }, [streak]);

  useEffect(() => {
    if (streak > prevStreakRef.current && MILESTONES.includes(streak)) {
      show(MILESTONE_MESSAGES[streak] || `🔥 ${streak} day streak!`);
      const spots = [0.2, 0.4, 0.6, 0.8];
      spots.forEach((p, i) => setTimeout(() => fire(window.innerWidth * p, 90), i * 90));
      if (soundEnabled) { playMilestoneChime(); doVibrate([90, 60, 90, 60, 140]); }
    }
    prevStreakRef.current = streak;
  }, [streak]);

  useEffect(() => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ categories, tasks, points, bestStreak, frozenDates, soundEnabled }));
    } catch (e) {
      console.error("Failed to save state", e);
    }
  }, [categories, tasks, points, bestStreak, frozenDates, soundEnabled]);

  const resetAllData = () => {
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
    setCategories(DEFAULT_CATEGORIES);
    setTasks([]);
    setPoints(0);
    setBestStreak(0);
    setFrozenDates([]);
    setView("home");
  };

  return (
    <div className="bz-app">
      {layer}
      {toastNode}
      <Header view={view} setView={changeView} freezesAvailable={freezesAvailable} />
      <div className="bz-content" onScroll={onWaveScroll} onTouchStart={onContentTouchStart} onTouchEnd={onContentTouchEnd}>
        {waveNode}
        <div key={view} className={"bz-tab-pane" + (slideDir === "left" ? " dir-left" : "")}>
          {view === "home" && (
            <Home
              tasks={tasks} categories={categories} points={points} bestStreak={bestStreak} streak={streak}
              totalCompleted={totalCompleted} livingOnFreeze={livingOnFreeze}
              toggleDone={toggleDone} removeTask={removeTask}
            />
          )}
          {view === "add" && (
            <AddPage categories={categories} addTask={addTask} setView={changeView} />
          )}
          {view === "calendar" && (
            <CalendarView
              tasks={tasks} categories={categories} calMonth={calMonth} setCalMonth={setCalMonth}
              selectedDate={selectedDate} setSelectedDate={setSelectedDate} toggleDone={toggleDone} removeTask={removeTask}
            />
          )}
          {view === "timer" && <TimerTab />}
          {view === "stats" && <StatsView tasks={tasks} />}
          {view === "settings" && <SettingsView categories={categories} addCategory={addCategory} resetAllData={resetAllData} soundEnabled={soundEnabled} setSoundEnabled={setSoundEnabled} />}
        </div>
      </div>
      <BottomNav view={view} setView={changeView} />
    </div>
  );
}

function Header({ view, setView, freezesAvailable }) {
  const titles = { home: "Blaze", add: "New task", calendar: "Calendar", timer: "Stopwatch", stats: "Stats", settings: "Settings" };
  return (
    <div className="bz-header">
      <div className="bz-header-title">{view === "home" ? <span>Blaze 🔥</span> : titles[view]}</div>
      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
        {freezesAvailable > 0 && (
          <div className="bz-freeze-badge" title="Streak freezes — auto-protect a missed day">🧊 {freezesAvailable}</div>
        )}
        <div className="bz-header-gear" onClick={() => setView("settings")}>⚙️</div>
      </div>
    </div>
  );
}

function BottomNav({ view, setView }) {
  const items = [
    { id: "home", label: "Home", icon: "🏠" },
    { id: "calendar", label: "Calendar", icon: "📅" },
    { id: "add", label: "Add", icon: "+", fab: true },
    { id: "timer", label: "Timer", icon: "⏱️" },
    { id: "stats", label: "Stats", icon: "📊" },
  ];
  return (
    <div className="bz-bottomnav">
      {items.map(it => (
        <button
          key={it.id}
          className={"bz-navbtn" + (view === it.id ? " active" : "") + (it.fab ? " fab" : "")}
          onClick={() => setView(it.id)}
        >
          <span className="bz-navicon">{it.icon}</span>
          {!it.fab && <span>{it.label}</span>}
        </button>
      ))}
    </div>
  );
}

function TaskList({ tasks, categories, toggleDone, removeTask, emptyMessage }) {
  const catById = useMemo(() => { const m = {}; categories.forEach(c => m[c.id] = c); return m; }, [categories]);
  if (tasks.length === 0) return <div className="bz-empty">{emptyMessage || "Nothing here yet."}</div>;
  return (
    <ul className="bz-task-list">
      {tasks.map(t => (
        <TaskItem key={t.id} t={t} cat={catById[t.categoryId]} toggleDone={toggleDone} removeTask={removeTask} />
      ))}
    </ul>
  );
}

const SWIPE_THRESHOLD = 76;

function TaskItem({ t, cat, toggleDone, removeTask }) {
  const [dragX, setDragX] = useState(0);
  const [dragging, setDragging] = useState(false);
  const startXRef = React.useRef(0);
  const startYRef = React.useRef(0);
  const lockedRef = React.useRef(null); // "h" or "v" once a direction is decided

  const onTouchStart = (e) => {
    startXRef.current = e.touches[0].clientX;
    startYRef.current = e.touches[0].clientY;
    lockedRef.current = null;
    setDragging(true);
  };
  const onTouchMove = (e) => {
    const dx = e.touches[0].clientX - startXRef.current;
    const dy = e.touches[0].clientY - startYRef.current;
    if (!lockedRef.current) {
      if (Math.abs(dx) > 8 || Math.abs(dy) > 8) {
        lockedRef.current = Math.abs(dx) > Math.abs(dy) ? "h" : "v";
      }
    }
    if (lockedRef.current === "h") {
      setDragX(dx);
    }
  };
  const onTouchEnd = () => {
    setDragging(false);
    if (dragX > SWIPE_THRESHOLD) {
      toggleDone(t.id);
    } else if (dragX < -SWIPE_THRESHOLD) {
      removeTask(t.id);
    }
    setDragX(0);
    lockedRef.current = null;
  };

  const revealRight = Math.min(1, Math.max(0, dragX / SWIPE_THRESHOLD));
  const revealLeft = Math.min(1, Math.max(0, -dragX / SWIPE_THRESHOLD));

  return (
    <li style={{ position: "relative", overflow: "hidden", borderRadius: 12 }}>
      {dragX !== 0 && (
        <div style={{
          position: "absolute", top: 0, bottom: 0, left: 0, right: 0,
          display: "flex", justifyContent: dragX > 0 ? "flex-start" : "flex-end",
          alignItems: "center", padding: "0 16px",
          background: dragX > 0 ? `rgba(62,207,142,${0.18 + revealRight * 0.3})` : `rgba(239,68,68,${0.18 + revealLeft * 0.3})`,
          fontSize: 18, fontWeight: 800,
        }}>
          {dragX > 0 ? <span style={{ opacity: revealRight }}>✅ {t.done ? "Undo" : "Done"}</span> : <span style={{ opacity: revealLeft }}>🗑️ Delete</span>}
        </div>
      )}
      <div
        className={"bz-task-item" + (!t.done && typeof t.minutes === "number" && t.minutes <= 30 ? " due-soon" : "")}
        style={{
          "--cat-color": cat ? cat.color : "#ff7a1a",
          transform: `translateX(${dragX}px)`,
          transition: dragging ? "none" : "transform 0.2s ease",
          touchAction: "pan-y",
        }}
        onTouchStart={onTouchStart}
        onTouchMove={onTouchMove}
        onTouchEnd={onTouchEnd}
      >
        <div className={"bz-check" + (t.done ? " on" : "")} onClick={(e) => toggleDone(t.id, e)} role="button" aria-label="toggle done" />
        <div className="bz-task-body">
          <div className={"bz-task-text" + (t.done ? " done" : "")}>{t.text}</div>
          <div className="bz-task-meta">
            {cat && <span className="bz-pill" style={{ background: cat.color + "26", color: cat.color }}>{cat.name}</span>}
            <span className="bz-pill" style={{ background: PRIORITY_COLOR[t.priority] + "26", color: PRIORITY_COLOR[t.priority] }}>{PRIORITY_LABEL[t.priority]}</span>
            {t.repeat && t.repeat !== "none" && <span className="bz-pill" style={{ background: "#ffc94d26", color: "#ffc94d" }}>{t.repeat === "daily" ? "Daily" : "Weekly"}</span>}
            <span className="bz-pill" style={{ background: "var(--surface-2)", color: "var(--text-dim)" }}>
              {typeof t.minutes === "number" ? (t.minutes >= 60 ? `${(t.minutes / 60).toFixed(1)}h` : `${t.minutes}m`) : "N/A"}
            </span>
          </div>
        </div>
        <button className="bz-del" onClick={() => removeTask(t.id)} aria-label="delete">×</button>
      </div>

}

function Home({ tasks, categories, points, bestStreak, streak, totalCompleted, livingOnFreeze, toggleDone, removeTask }) {
  const todayTasks = tasks.filter(t => t.date === todayStr());
  const todayDone = todayTasks.filter(t => t.done).length;
  const todayTotal = todayTasks.length;
  const pct = todayTotal === 0 ? 0 : Math.round((todayDone / todayTotal) * 100);
  const tier = streakTier(streak);

  const minutesLeft = todayTasks.filter(t => !t.done && typeof t.minutes === "number").reduce((s, t) => s + t.minutes, 0);
  const hasAnyTime = todayTasks.some(t => typeof t.minutes === "number");
  const timeLeftLabel = !hasAnyTime ? "N/A" : (minutesLeft >= 60 ? `${(minutesLeft / 60).toFixed(1)}h` : `${minutesLeft}m`);

  return (
    <div>

        </div>
        <div style={{ flex: 1 }}>
          <div className="bz-hero-num">{streak} <span style={{ fontSize: 13, fontWeight: 600, color: "var(--text-dim)" }}>day streak</span></div>
          <div className="bz-hero-tier" style={{ color: tier.color }}>

      <div className="bz-stats-row">
        <div className="bz-stat-card">
          <div className="bz-stat-icon">⚡</div>
          <div className="bz-stat-value">{points}</div>
          <div className="bz-stat-label">Heat</div>
        </div>
        <div className="bz-stat-card">
          <div className="bz-stat-icon">🏆</div>
          <div className="bz-stat-value">{bestStreak}</div>

        </div>
        <div className="bz-stat-card">
          <div className="bz-stat-icon">✅</div>
          <div className="bz-stat-value">{totalCompleted}</div>
          <div className="bz-stat-label">Cleared</div>
        </div>
      </div>

      <div className="bz-gauge-card">
        <div className="bz-gauge-top"><span>Today's burn</span><span>{todayDone}/{todayTotal} tasks</span></div>
        <div className="bz-gauge-bg"><div className="bz-gauge-fill" style={{ width: pct + "%" }} /></div>
        <div style={{ marginTop: 10, fontSize: 12, color: "var(--text-dim)", display: "flex", justifyContent: "space-between" }}>
          <span>Time left today</span>
          <span style={{ fontWeight: 800, color: "var(--text)" }}>{timeLeftLabel}</span>

          <div className="bz-all-done-text">All burned down!</div>

function AddPage({ categories, addTask, setView }) {
  const [text, setText] = useState("");
  const [categoryId, setCategoryId] = useState(categories[0]?.id || "");
  const [priority, setPriority] = useState("medium");
  const [repeat, setRepeat] = useState("none");
  const [weekdays, setWeekdays] = useState([new Date().getDay()]);
  const [minutesInput, setMinutesInput] = useState("");
  const [startDate, setStartDate] = useState(todayStr());

  const toggleWeekday = (i) => {
    setWeekdays(prev => prev.includes(i) ? prev.filter(w => w !== i) : [...prev, i].sort());
  };

  const submit = (e) => {
    e.preventDefault();
    const t = text.trim();
    if (!t) return;
    if (repeat === "weekly" && weekdays.length === 0) return;
    const parsedMinutes = minutesInput.trim() === "" ? null : Number(minutesInput);
    const minutes = (parsedMinutes !== null && !isNaN(parsedMinutes) && parsedMinutes >= 0) ? parsedMinutes : null;
    addTask(t, categoryId, priority, startDate || todayStr(), repeat, weekdays, minutes);
    setText("");
    setMinutesInput("");
    setStartDate(todayStr());
    setView("home");
  };

  return (
    <form className="bz-add-page" onSubmit={submit}>
      <div className="bz-add-hero">
        <span className="bz-add-hero-emoji">🔥</span>
        <div className="bz-add-hero-title">Throw another log on</div>
        <div className="bz-add-hero-sub">What are you tackling?</div>
      </div>

      <div>
        <input className="bz-big-input" value={text} onChange={(e) => setText(e.target.value)} placeholder="e.g. finish report draft" autoFocus />
      </div>

      <div>
        <div className="bz-field-label">{repeat === "none" ? "Date" : "Starts on"}</div>
        <input
          className="bz-big-input"
          type="date"
          value={startDate}
          onChange={(e) => setStartDate(e.target.value)}
        />
      </div>

      <div>
        <div className="bz-field-label">Time it'll take (optional)</div>
        <input
          className="bz-big-input"
          type="number"
          min="0"
          inputMode="numeric"
          value={minutesInput}
          onChange={(e) => setMinutesInput(e.target.value)}
          placeholder="minutes — leave blank for N/A"
        />
      </div>

      <div>
        <div className="bz-field-label">Category</div>
        <div className="bz-chip-row">
          {categories.map(c => (
            <div
              key={c.id}
              className={"bz-chip" + (categoryId === c.id ? " selected" : "")}
              style={categoryId === c.id ? { background: c.color, borderColor: c.color } : {}}
              onClick={() => setCategoryId(c.id)}
            >
              {c.name}
            </div>
          ))}
        </div>
      </div>

      <div>
        <div className="bz-field-label">Priority</div>
        <div className="bz-chip-row">
          {["low","medium","high"].map(p => (
            <div
              key={p}
              className={"bz-chip" + (priority === p ? " selected" : "")}
              style={priority === p ? { background: PRIORITY_COLOR[p], borderColor: PRIORITY_COLOR[p] } : {}}
              onClick={() => setPriority(p)}
            >
              {p === "low" ? "🔹 Low" : p === "medium" ? "🔶 Medium" : "🔥 High"}
            </div>
          ))}
        </div>
      </div>

      <div>
        <div className="bz-field-label">Repeat</div>
        <div className="bz-chip-row">
          {[["none","Just once"],["daily","Every day"],["weekly","Every week"]].map(([val, label]) => (
            <div
              key={val}
              className={"bz-chip" + (repeat === val ? " selected" : "")}
              style={repeat === val ? { background: "#ffc94d", borderColor: "#ffc94d" } : {}}
              onClick={() => setRepeat(val)}
            >
              {label}
            </div>
          ))}
        </div>
      </div>

      {repeat === "weekly" && (
        <div>
          <div className="bz-field-label">Which days (pick as many as you want)</div>
          <div className="bz-chip-row">
            {WEEKDAYS.map((w, i) => (
              <div
                key={i}
                className={"bz-chip" + (weekdays.includes(i) ? " selected" : "")}
                style={weekdays.includes(i) ? { background: "#4da6ff", borderColor: "#4da6ff" } : {}}
                onClick={() => toggleWeekday(i)}
              >
                {w}
              </div>
            ))}
          </div>
        </div>
      )}

      <button className="bz-submit-btn" type="submit" disabled={!text.trim() || (repeat === "weekly" && weekdays.length === 0)}>
        🔥 Add to the fire
      </button>
    </form>
  );
}

function CalendarView({ tasks, categories, calMonth, setCalMonth, selectedDate, setSelectedDate, toggleDone, removeTask }) {
  const year = calMonth.getFullYear();
  const month = calMonth.getMonth();
  const firstDay = new Date(year, month, 1);
  const startOffset = firstDay.getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const monthLabel = calMonth.toLocaleDateString(undefined, { month: "long", year: "numeric" });
  const catById = useMemo(() => { const m = {}; categories.forEach(c => m[c.id] = c); return m; }, [categories]);

  const cells = [];
  for (let i = 0; i < startOffset; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const dateStrFor = (d) => fmtDate(new Date(year, month, d));
  const today = todayStr();
  const goMonth = (delta) => setCalMonth(new Date(year, month + delta, 1));
  const selectedTasks = tasks.filter(t => t.date === selectedDate);

  return (
    <div>
      <div className="bz-cal-nav">
        <button className="bz-cal-navbtn" onClick={() => goMonth(-1)}>‹</button>
        <div className="bz-cal-month">{monthLabel}</div>
        <button className="bz-cal-navbtn" onClick={() => goMonth(1)}>›</button>
      </div>
      <div className="bz-cal-grid">
        {WEEKDAYS.map(d => <div className="bz-cal-head" key={d}>{d}</div>)}
        {cells.map((d, i) => {
          if (d === null) return <div className="bz-cal-cell empty" key={i} />;
          const ds = dateStrFor(d);
          const dayTasks = tasks.filter(t => t.date === ds);
          const isToday = ds === today;
          const isSelected = ds === selectedDate;
          return (
            <div key={i} className={"bz-cal-cell" + (isToday ? " today" : "") + (isSelected ? " selected" : "")} onClick={() => setSelectedDate(ds)}>
              <div className="bz-cal-daynum">{d}</div>
              <div className="bz-cal-dots">
                {dayTasks.slice(0, 4).map(t => {
                  const c = catById[t.categoryId];
                  return <div className="bz-cal-dot" style={{ background: c ? c.color : "#999" }} key={t.id} />;
                })}
              </div>
            </div>
          );
        })}
      </div>

      <div className="bz-section-title">
        {new Date(selectedDate + "T00:00:00").toLocaleDateString(undefined, { weekday: "long", month: "short", day: "numeric" })}
      </div>
      <TaskList tasks={selectedTasks} categories={categories} toggleDone={toggleDone} removeTask={removeTask} emptyMessage="No tasks scheduled for this day." />
    </div>
  );
}

function TimerTab() {

const TIMER_PRESETS = [1, 5, 10, 15, 25, 60];

function CountdownView() {
  const [durationSec, setDurationSec] = useState(5 * 60);
  const [remaining, setRemaining] = useState(5 * 60);
  const [running, setRunning] = useState(false);
  const [done, setDone] = useState(false);
  const intervalRef = React.useRef(null);

  useEffect(() => {
    if (!running) { clearInterval(intervalRef.current); return; }
    intervalRef.current = setInterval(() => {
      setRemaining(prev => {
        if (prev <= 1) {
          clearInterval(intervalRef.current);
          setRunning(false);
          setDone(true);
          playMilestoneChime();
          doVibrate([120, 80, 120]);
          return 0;
        }
        return prev - 1;
      });
    }, 1000);
    return () => clearInterval(intervalRef.current);
  }, [running]);

  const setPreset = (mins) => {
    if (running) return;
    setDurationSec(mins * 60);
    setRemaining(mins * 60);
    setDone(false);
  };
  const adjust = (deltaMin) => {
    if (running) return;
    const next = Math.max(60, durationSec + deltaMin * 60);
    setDurationSec(next);
    setRemaining(next);
    setDone(false);
  };
  const toggle = () => { setDone(false); setRunning(r => !r); };
  const reset = () => { setRunning(false); setRemaining(durationSec); setDone(false); };

  const progress = durationSec === 0 ? 0 : 1 - remaining / durationSec;
  const flameStreak = done ? 40 : progress >= 0.75 ? 14 : progress >= 0.5 ? 7 : progress >= 0.25 ? 3 : progress > 0 ? 1 : 0;
  const m = String(Math.floor(remaining / 60)).padStart(2, "0");
  const s = String(remaining % 60).padStart(2, "0");

  return (
    <div>
      <div className="bz-seg-row" style={{ marginBottom: 8 }}>
        {TIMER_PRESETS.map(p => (
          <div key={p} className={"bz-seg-btn" + (durationSec === p * 60 ? " active" : "")} onClick={() => setPreset(p)}>{p}m</div>
        ))}
      </div>

      <div className="bz-stopwatch-face">
        <div className={"bz-timer-flame" + (running || done ? " lit" : "")} style={{ display: "flex", justifyContent: "center", marginBottom: 4 }}>
          <FlameIcon streak={flameStreak} size={44} />
        </div>
        <div className="bz-sw-time">{m}:{s}</div>
        <div style={{ height: 20, marginTop: 6, fontWeight: 800, fontSize: 13, color: "var(--gold)" }}>{done ? "Time's up!" : "\u00A0"}</div>

        <div className="bz-sw-ctrl-row">
          <button className="bz-sw-btn" onClick={() => adjust(-1)} disabled={running}>−1m</button>
          <button className="bz-sw-btn primary" onClick={toggle} disabled={remaining <= 0}>{running ? "Pause" : "Start"}</button>
          <button className="bz-sw-btn" onClick={() => adjust(1)} disabled={running}>+1m</button>
        </div>
        <button className="bz-sw-btn" style={{ width: "auto", padding: "0 22px", marginTop: 18, borderRadius: 20 }} onClick={reset}>Reset</button>
      </div>
    </div>
  );
}

function formatStopwatch(ms) {
  const totalCs = Math.floor(ms / 10);
  const cs = totalCs % 100;
  const totalSec = Math.floor(totalCs / 100);
  const s = totalSec % 60;
  const m = Math.floor(totalSec / 60);
  return { m: String(m).padStart(2, "0"), s: String(s).padStart(2, "0"), cs: String(cs).padStart(2, "0") };
}

function StopwatchView() {
  const [elapsed, setElapsed] = useState(0);
  const [running, setRunning] = useState(false);
  const [laps, setLaps] = useState([]);
  const startRef = React.useRef(0);
  const rafRef = React.useRef(null);

  useEffect(() => {
    if (!running) return;
    startRef.current = Date.now() - elapsed;
    const tick = () => {
      setElapsed(Date.now() - startRef.current);
      rafRef.current = requestAnimationFrame(tick);
    };
    rafRef.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(rafRef.current);
  }, [running]);

  const toggle = () => setRunning(r => !r);
  const reset = () => { setRunning(false); setElapsed(0); setLaps([]); };
  const lap = () => setLaps(prev => [{ id: Date.now(), total: elapsed }, ...prev]);

  const { m, s, cs } = formatStopwatch(elapsed);
  const lapDeltas = laps.map((l, i) => ({ ...l, delta: l.total - (i === laps.length - 1 ? 0 : laps[i + 1].total) }));
  const deltas = lapDeltas.map(l => l.delta);
  const best = deltas.length > 1 ? Math.min(...deltas) : null;
  const worst = deltas.length > 1 ? Math.max(...deltas) : null;

  return (
    <div>
      <div className="bz-stopwatch-face">
        <div className={"bz-timer-flame" + (running ? " lit" : "")} style={{ display: "flex", justifyContent: "center", marginBottom: 4 }}>
          <FlameIcon streak={running ? 1 : 0} size={40} />
        </div>
        <div className="bz-sw-time">{m}:{s}<span className="bz-sw-ms">.{cs}</span></div>
        <div className="bz-sw-ctrl-row">
          <button className="bz-sw-btn" onClick={reset} disabled={!elapsed && laps.length === 0}>Reset</button>
          <button className="bz-sw-btn primary" onClick={toggle}>{running ? "Stop" : "Start"}</button>
          <button className="bz-sw-btn" onClick={lap} disabled={!running}>Lap</button>
        </div>
      </div>
      {lapDeltas.length > 0 && (
        <div className="bz-sw-laps">
          {lapDeltas.map((l, i) => {
            const f = formatStopwatch(l.delta);
            const cls = l.delta === best ? "best" : l.delta === worst ? "worst" : "";
            return (
              <div className="bz-lap-row" key={l.id}>
                <span className="bz-lap-num">Lap {lapDeltas.length - i}</span>
                <span className={"bz-lap-time " + cls}>{f.m}:{f.s}.{f.cs}</span>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function StatsView({ tasks }) {
  const counts = useMemo(() => {
    const c = [0,0,0,0,0,0,0];
    tasks.filter(t => t.done).forEach(t => { c[new Date(t.date + "T00:00:00").getDay()]++; });
    return c;
  }, [tasks]);
  const max = Math.max(1, ...counts);
  const totalMinutes = tasks.filter(t => t.done && t.minutes).reduce((s, t) => s + t.minutes, 0);
  const totalHrs = (totalMinutes / 60).toFixed(1);

  return (
    <div>
      <div className="bz-stats-row" style={{ gridTemplateColumns: "repeat(2, 1fr)" }}>
        <div className="bz-stat-card">
          <div className="bz-stat-icon">⏱️</div>
          <div className="bz-stat-value">{totalHrs}h</div>
          <div className="bz-stat-label">Time cleared</div>
        </div>
        <div className="bz-stat-card">
          <div className="bz-stat-icon">🔥</div>
          <div className="bz-stat-value">{tasks.filter(t => t.done).length}</div>
          <div className="bz-stat-label">Tasks cleared</div>
        </div>
      </div>
      <div className="bz-section-title">📊 Completed by day</div>
      <div className="bz-bars">
        {WEEKDAYS_FULL.map((w, i) => (
          <div className="bz-bar-col" key={w}>
            <div className="bz-bar" style={{ height: `${(counts[i] / max) * 110 + 4}px` }} />
            <div className="bz-bar-label">{WEEKDAYS[i]}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

      <div className="bz-cat-row"><span style={{color: PRIORITY_COLOR.high, fontWeight: 700}}>🔥 High priority</span><span style={{marginLeft: "auto", fontWeight: 700}}>{PRIORITY_POINTS.high} heat</span></div>

      <div className="bz-section-title" style={{ marginTop: 20, color: "var(--red)" }}>Danger zone</div>
      <button

        style={{ background: "linear-gradient(135deg, var(--red), #b91c1c)", color: "#fff" }}
        onClick={handleReset}
        type="button"
      >
        Reset all data
      </button>
    </div>
  );
}
